name: Release Obsidian plugin

on:
  push:
    tags:
      - '*'

jobs:
  build:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
      packages: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@nutstore'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.13.1

      - name: Build plugin
        env:
          NS_NSDAV_ENDPOINT: ${{ vars.NS_NSDAV_ENDPOINT }}
          NS_DAV_ENDPOINT: ${{ vars.NS_DAV_ENDPOINT }}
          NUTSTORE_PAT: ${{ secrets.GITHUB_TOKEN }}
          NODE_ENV: production
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pnpm install
          pnpm run build

      - name: Attest release assets
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css

      - name: Publish release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF#refs/tags/}"
          assets=(main.js manifest.json styles.css)

          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" --title="$tag" "${assets[@]}"
            exit 0
          fi

          for asset in "${assets[@]}"; do
            gh release delete-asset "$tag" "$asset" --yes >/dev/null 2>&1 || true
          done
          gh release upload "$tag" "${assets[@]}" --clobber