name: Release Obsidian plugin

on:
  push:
    branches:
      - main
    tags:
      - '*'
    paths:
      - manifest.json
      - package.json
      - versions.json
      - .github/workflows/release.yml

jobs:
  build:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            tag="${GITHUB_REF#refs/tags/}"
          else
            tag="$(node -p "require('./manifest.json').version")"

            if [ -z "$tag" ] || [ "$tag" = "undefined" ]; then
              echo "Unable to read plugin version from manifest.json"
              exit 1
            fi

            if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
              echo "Tag ${tag} already exists; refreshing release assets from this checkout."
            else
              git config user.name "github-actions[bot]"
              git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
              git tag "$tag" "$GITHUB_SHA"
              git push origin "refs/tags/${tag}"
            fi
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.13.1

      - name: Build plugin
        env:
          NS_NSDAV_ENDPOINT: ${{ vars.NS_NSDAV_ENDPOINT }}
          NS_DAV_ENDPOINT: ${{ vars.NS_DAV_ENDPOINT }}
          NODE_ENV: production
        run: |
          pnpm install
          pnpm run build

      - name: Attest release assets
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css
            mcp-stdio-bridge.cjs

      - name: Publish release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail
          tag="$RELEASE_TAG"
          assets=(main.js manifest.json styles.css mcp-stdio-bridge.cjs)

          release_notes=$(
            cat <<EOF
          Guozha AI Pro ${tag}

          - Refreshes the community review release with verified build assets.
          - Requires Obsidian 1.7.2 or newer to match the plugin API usage.
          EOF
          )

          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" --title="$tag" --notes "$release_notes" "${assets[@]}"
            exit 0
          fi

          gh release edit "$tag" --notes "$release_notes"

          for asset in "${assets[@]}"; do
            gh release delete-asset "$tag" "$asset" --yes >/dev/null 2>&1 || true
          done
          gh release upload "$tag" "${assets[@]}" --clobber